<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Recolor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0b0e;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            color: #e3e3e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1040px;
            width: 100%;
        }

        /* header */
        .title {
            font-family: 'Vivaldi', sans-serif;
            font-weight: 500;
            font-size: 50px;
            letter-spacing: 0.8px;
            color: #f5a885;
        }

        .sub {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 0.2px;
            color: #6b6b78;
            margin-bottom: 2.2rem;
        }

        /* control card – clean minimal panel */
        .control-card {
            background: #131316;
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            border: 1px solid #26262b;
            margin-bottom: 1.8rem;
            backdrop-filter: blur(4px);
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 2.5rem 3rem;
            margin-bottom: 2rem;
        }
        .control-row:last-child {
            margin-bottom: 0;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .control-label {
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8f8f9f;
        }

        .toggle-group {
            display: flex;
            gap: 0.4rem;
            background: #1e1e23;
            padding: 0.25rem;
            border-radius: 3rem;
            border: 1px solid #2d2d33;
        }
        .toggle-btn {
            background: transparent;
            border: none;
            color: #9a9aa7;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.45rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            letter-spacing: 0.02em;
        }
        .toggle-btn.active {
            background: #ffffff;
            color: #0b0b0e;
            box-shadow: 0 2px 8px rgba(255,255,255,0.1);
        }

        .dim-box {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            background: #1a1a1f;
            padding: 0.3rem 1rem 0.3rem 1.2rem;
            border-radius: 3rem;
            border: 1px solid #2f2f37;
        }
        .dim-box span {
            font-size: 0.7rem;
            font-weight: 400;
            color: #a0a0af;
        }
        .dim-input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 500;
            width: 70px;
            text-align: right;
            outline: none;
            font-family: inherit;
        }
        .dim-input[readonly] {
            cursor: default;
            color: #ddd;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            min-width: 240px;
        }
        .slider {
            width: 180px;
            height: 2px;
            background: #575757;
            border-radius: 2px;
            -webkit-appearance: none;
            appearance: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #d6d6d6;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(255,255,255,0.3);
        }
        .slider-value {
            font-size: 0.8rem;
            font-weight: 500;
            color: #fff;
            background: #1e1e24;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            border: 1px solid #33333b;
            min-width: 55px;
            text-align: center;
        }

        /* palette card */
        .palette-card {
            background: #131316;
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            border: 1px solid #26262b;
            margin-bottom: 1.8rem;
        }

        .palette-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.4rem;
        }
        .palette-header span {
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #8f8f9f;
        }
        .action-group {
            display: flex;
            gap: 0.5rem;
        }
        .icon-btn {
            width: 2.2rem;
            height: 2.2rem;
            background: #1e1e24;
            border: 1px solid #33333b;
            border-radius: 2rem;
            color: #c5c5d2;
            font-size: 1.1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .icon-btn:hover {
            background: #2b2b33;
            color: #fff;
            border-color: #4b4b59;
        }

        .swatches {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .swatch {
            width: 3.2rem;
            height: 3.2rem;
            border-radius: 1rem;
            cursor: pointer;
            border: 2px solid #2d2d35;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            transition: transform 0.1s, border-color 0.1s;
            position: relative;
        }
        .swatch:hover {
            transform: scale(1.02);
            border-color: #6a6a7c;
        }
        .swatch input {
            position: absolute;
            inset: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* upload area */
        .upload-area {
            background: #131316;
            border-radius: 2rem;
            border: 1px dashed #3a3a44;
            padding: 3rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            margin-bottom: 1.8rem;
        }
        .upload-area:hover {
            background: #18181d;
            border-color: #5e5e70;
        }
        .upload-area p {
            font-size: 0.75rem;
            color: #888896;
            margin-bottom: 1rem;
        }
        .btn {
            background: #23232a;
            border: none;
            color: #f0f0f5;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.7rem 1.8rem;
            border-radius: 3rem;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: background 0.15s;
            font-family: inherit;
            border: 1px solid #3b3b45;
        }
        .btn:hover {
            background: #2f2f38;
        }
        .btn.primary {
            background: #ffffff;
            color: #0b0b0e;
            border: none;
            font-weight: 600;
        }
        .btn.primary:hover {
            background: #f0f0f0;
        }
        .btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        input[type="file"] { display: none; }

        /* canvas panel */
        .canvas-panel {
            background: #131316;
            border-radius: 2rem;
            padding: 1.8rem;
            border: 1px solid #26262b;
            display: none;
        }
        .canvas-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #canvas {
            max-width: 100%;
            max-height: 65vh;
            border-radius: 1.2rem;
            background: #0a0a0c;
            box-shadow: 0 12px 28px rgba(0,0,0,0.8);
            border: 1px solid #2c2c34;
        }
        .action-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Hropiberhtaz</div>
        <div class="sub"> </div>
        <div class="sub">Smooth </div>

        <!-- QUALITY / DIMENSIONS / MODE / STRENGTH / SMOOTHING -->
        <div class="control-card">
            <div class="control-row">
                <div class="control-group">
                    <div class="control-label">quality</div>
                    <div class="toggle-group" id="qualityGroup">
                        <button class="toggle-btn active" data-quality="high">HIGH</button>
                        <button class="toggle-btn" data-quality="med">MED</button>
                        <button class="toggle-btn" data-quality="low">LOW</button>
                    </div>
                </div>

                <div class="control-group">
                    <div class="control-label">dimensions</div>
                    <div class="dim-box">
                        <span>𝐖</span>
                        <input type="text" class="dim-input" id="widthInput" value="—" readonly>
                        <span style="margin-left: 0.2rem;">𝐇</span>
                        <input type="text" class="dim-input" id="heightInput" value="—" readonly>
                    </div>
                </div>
            </div>

            <div class="control-row">
                <div class="control-group">
                    <div class="control-label">mode</div>
                    <div class="toggle-group" id="modeGroup">
                        <button class="toggle-btn" data-mode="blocky">PIXELATED</button>
                        <button class="toggle-btn active" data-mode="smooth">SMOOTH</button>
                        <button class="toggle-btn" data-mode="detail">DETAIL</button>
                    </div>
                </div>

                <div class="control-group">
                    <div class="control-label">strength</div>
                    <div class="slider-container">
                        <input type="range" id="strengthSlider" class="slider" min="0" max="100" value="95">
                        <span class="slider-value" id="strengthVal">0.95</span>
                    </div>
                </div>

                <div class="control-group">
                    <div class="control-label">smoothing</div>
                    <div class="slider-container">
                        <input type="range" id="smoothSlider" class="slider" min="0" max="100" value="70">
                        <span class="slider-value" id="smoothVal">0.70</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- PALETTE -->
        <div class="palette-card">
            <div class="palette-header">
                <span>palette</span>
                <div class="action-group">
                    <button class="icon-btn" id="loadJsonBtn" title="load palette (json)">↓</button>
                    <button class="icon-btn" id="addColorBtn">+</button>
                    <button class="icon-btn" id="removeColorBtn">–</button>
                </div>
            </div>
            <div class="swatches" id="swatchesContainer">
                <div class="swatch" style="background: #3a4f63;"><input type="color" value="#3a4f63"></div>
                <div class="swatch" style="background: #607d8b;"><input type="color" value="#607d8b"></div>
                <div class="swatch" style="background: #a1887f;"><input type="color" value="#a1887f"></div>
                <div class="swatch" style="background: #d7ccc8;"><input type="color" value="#d7ccc8"></div>
                <div class="swatch" style="background: #f5f0eb;"><input type="color" value="#f5f0eb"></div>
            </div>
        </div>

        <!-- UPLOAD -->
        <div class="upload-area" id="uploadZone">
            <p>PNG, JPG or WEBP</p>
            <button class="btn" id="selectImageBtn">Choose Image</button>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <!-- CANVAS + ACTION BUTTONS -->
        <div class="canvas-panel" id="canvasPanel">
            <div class="canvas-wrapper">
                <canvas id="canvas"></canvas>
                <div class="action-row">
                    <button class="btn primary" id="applyBtn">Apply Palette</button>
                    <button class="btn" id="resetBtn">Reset</button>
                    <button class="btn" id="downloadBtn">Download</button>
                </div>
            </div>
        </div>

        <!-- hidden json input -->
        <input type="file" id="jsonInput" accept=".json,application/json" class="hidden-input">
    </div>

    <script>
        (function() {
            // --- DOM elements ---
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const fileInput = document.getElementById('fileInput');
            const uploadZone = document.getElementById('uploadZone');
            const selectImageBtn = document.getElementById('selectImageBtn');
            const canvasPanel = document.getElementById('canvasPanel');
            const swatchesContainer = document.getElementById('swatchesContainer');
            const widthInput = document.getElementById('widthInput');
            const heightInput = document.getElementById('heightInput');
            const strengthSlider = document.getElementById('strengthSlider');
            const smoothSlider = document.getElementById('smoothSlider');
            const strengthVal = document.getElementById('strengthVal');
            const smoothVal = document.getElementById('smoothVal');
            const applyBtn = document.getElementById('applyBtn');
            const resetBtn = document.getElementById('resetBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const addColorBtn = document.getElementById('addColorBtn');
            const removeColorBtn = document.getElementById('removeColorBtn');
            const loadJsonBtn = document.getElementById('loadJsonBtn');
            const jsonInput = document.getElementById('jsonInput');

            // quality & mode toggles
            const qualityToggles = document.querySelectorAll('#qualityGroup .toggle-btn');
            const modeToggles = document.querySelectorAll('#modeGroup .toggle-btn');
            let quality = 'high';
            let mode = 'smooth';

            qualityToggles.forEach(btn => {
                btn.addEventListener('click', () => {
                    qualityToggles.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    quality = btn.dataset.quality;
                });
            });

            modeToggles.forEach(btn => {
                btn.addEventListener('click', () => {
                    modeToggles.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    mode = btn.dataset.mode;
                });
            });

            // sliders display
            strengthSlider.addEventListener('input', (e) => {
                strengthVal.textContent = (e.target.value / 100).toFixed(2);
            });
            smoothSlider.addEventListener('input', (e) => {
                smoothVal.textContent = (e.target.value / 100).toFixed(2);
            });

            // Store original image and its dimensions (full size)
            let originalImageElement = null;
            let originalWidth = 0, originalHeight = 0;
            // Preview image data (scaled)
            let previewImageData = null;

            // --- swatch initialization ---
            function refreshSwatchListeners() {
                document.querySelectorAll('.swatch input').forEach(input => {
                    input.onchange = (e) => {
                        e.target.parentElement.style.background = e.target.value;
                    };
                });
            }
            refreshSwatchListeners();

            // --- palette helpers ---
            function getPaletteHex() {
                return Array.from(document.querySelectorAll('.swatch input')).map(i => i.value);
            }
            function hexToRgb(hex) {
                const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return m ? [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)] : null;
            }

            // --- add / remove swatch ---
            addColorBtn.addEventListener('click', () => {
                const rand = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
                const sw = document.createElement('div');
                sw.className = 'swatch';
                sw.style.background = rand;
                sw.innerHTML = `<input type="color" value="${rand}">`;
                sw.querySelector('input').onchange = (e) => e.target.parentElement.style.background = e.target.value;
                swatchesContainer.appendChild(sw);
            });

            removeColorBtn.addEventListener('click', () => {
                const swatches = document.querySelectorAll('.swatch');
                if (swatches.length > 1) swatches[swatches.length-1].remove();
            });

            // --- load palette from JSON ---
            loadJsonBtn.addEventListener('click', () => jsonInput.click());
            jsonInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        let colors = JSON.parse(ev.target.result);
                        if (colors.colors) colors = colors.colors;
                        if (colors.length && typeof colors[0] === 'object' && colors[0].hex) {
                            colors = colors.map(c => c.hex);
                        }
                        if (!colors.length) throw new Error('Empty palette');
                        document.querySelectorAll('.swatch').forEach(s => s.remove());
                        colors.forEach(hex => {
                            const sw = document.createElement('div');
                            sw.className = 'swatch';
                            sw.style.background = hex;
                            sw.innerHTML = `<input type="color" value="${hex}">`;
                            sw.querySelector('input').onchange = (e) => e.target.parentElement.style.background = e.target.value;
                            swatchesContainer.appendChild(sw);
                        });
                    } catch (err) {
                        alert('Invalid palette JSON');
                    }
                    jsonInput.value = '';
                };
                reader.readAsText(file);
            });

            // --- image upload ---
            function triggerFile() { fileInput.click(); }
            uploadZone.addEventListener('click', triggerFile);
            selectImageBtn.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });

            fileInput.onchange = (e) => {
                if (e.target.files[0]) loadImage(e.target.files[0]);
            };

            function loadImage(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        originalWidth = img.width;
                        originalHeight = img.height;
                        originalImageElement = img;

                        widthInput.value = originalWidth;
                        heightInput.value = originalHeight;

                        let w = originalWidth, h = originalHeight;
                        const maxDim = 1000;
                        if (w > maxDim || h > maxDim) {
                            if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
                            else { w = Math.round(w * maxDim / h); h = maxDim; }
                        }
                        canvas.width = w;
                        canvas.height = h;
                        ctx.drawImage(img, 0, 0, w, h);
                        previewImageData = ctx.getImageData(0, 0, w, h);

                        canvasPanel.style.display = 'block';
                        downloadBtn.style.display = 'inline-block';
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
                fileInput.value = '';
            }

            // --- reset (preview only) ---
            resetBtn.addEventListener('click', () => {
                if (previewImageData) {
                    ctx.putImageData(previewImageData, 0, 0);
                }
            });

            // --- core recoloring function (SYNC, used by preview) ---
            function recolorImageData(srcData, width, height) {
                const palette = getPaletteHex().map(hexToRgb).filter(c => c);
                if (palette.length === 0) return srcData;

                const outData = new ImageData(width, height);
                const src = srcData.data;
                const dst = outData.data;

                const strength = parseFloat(strengthVal.textContent);
                const smoothFactor = parseFloat(smoothVal.textContent);

                const sigma = mode === 'blocky' ? 1 : 30 + smoothFactor * 150;
                const invSigma2 = sigma > 0.1 ? 1 / (sigma * sigma) : 10000;

                const useBilateral = (mode === 'detail');

                const blended = new Uint8ClampedArray(src.length);
                for (let i = 0; i < src.length; i += 4) {
                    const alpha = src[i+3];
                    if (alpha === 0) {
                        blended.set(src.subarray(i, i+4), i);
                        continue;
                    }
                    const r = src[i], g = src[i+1], b = src[i+2];

                    if (mode === 'blocky') {
                        let best = palette[0];
                        let minDist = Infinity;
                        for (const col of palette) {
                            const dr = r - col[0], dg = g - col[1], db = b - col[2];
                            const d = dr*dr + dg*dg + db*db;
                            if (d < minDist) { minDist = d; best = col; }
                        }
                        blended[i] = best[0];
                        blended[i+1] = best[1];
                        blended[i+2] = best[2];
                        blended[i+3] = alpha;
                    } else {
                        let total = 0;
                        let sumR = 0, sumG = 0, sumB = 0;
                        for (const col of palette) {
                            const dr = r - col[0], dg = g - col[1], db = b - col[2];
                            const dist2 = dr*dr + dg*dg + db*db;
                            const w = Math.exp(-dist2 * invSigma2);
                            total += w;
                            sumR += col[0] * w;
                            sumG += col[1] * w;
                            sumB += col[2] * w;
                        }
                        if (total < 1e-6) {
                            let best = palette[0];
                            let minDist = Infinity;
                            for (const col of palette) {
                                const dr = r - col[0], dg = g - col[1], db = b - col[2];
                                const d = dr*dr + dg*dg + db*db;
                                if (d < minDist) { minDist = d; best = col; }
                            }
                            blended[i] = best[0];
                            blended[i+1] = best[1];
                            blended[i+2] = best[2];
                        } else {
                            blended[i] = Math.round(sumR / total);
                            blended[i+1] = Math.round(sumG / total);
                            blended[i+2] = Math.round(sumB / total);
                        }
                        blended[i+3] = alpha;
                    }
                }

                for (let i = 0; i < src.length; i += 4) {
                    if (src[i+3] === 0) {
                        dst[i] = src[i];
                        dst[i+1] = src[i+1];
                        dst[i+2] = src[i+2];
                        dst[i+3] = src[i+3];
                        continue;
                    }
                    const invStr = 1 - strength;
                    dst[i] = Math.round(src[i] * invStr + blended[i] * strength);
                    dst[i+1] = Math.round(src[i+1] * invStr + blended[i+1] * strength);
                    dst[i+2] = Math.round(src[i+2] * invStr + blended[i+2] * strength);
                    dst[i+3] = src[i+3];
                }

                if (useBilateral && smoothFactor > 0.01) {
                    const radius = Math.ceil(smoothFactor * 5);
                    const spatialSigma = smoothFactor * 8;
                    const colorSigma = 30;
                    const temp = new Uint8ClampedArray(dst);

                    for (let y = 0; y < height; y++) {
                        for (let x = 0; x < width; x++) {
                            const idx = (y * width + x) * 4;
                            if (temp[idx+3] === 0) continue;

                            let sumR = 0, sumG = 0, sumB = 0, sumW = 0;
                            for (let dy = -radius; dy <= radius; dy++) {
                                for (let dx = -radius; dx <= radius; dx++) {
                                    const ny = y + dy, nx = x + dx;
                                    if (ny < 0 || ny >= height || nx < 0 || nx >= width) continue;
                                    const j = (ny * width + nx) * 4;
                                    const spatialW = Math.exp(-(dx*dx+dy*dy) / (2 * spatialSigma * spatialSigma));
                                    const dr = temp[idx] - temp[j];
                                    const dg = temp[idx+1] - temp[j+1];
                                    const db = temp[idx+2] - temp[j+2];
                                    const colorW = Math.exp(-(dr*dr + dg*dg + db*db) / (2 * colorSigma * colorSigma));
                                    const wgt = spatialW * colorW;
                                    sumR += temp[j] * wgt;
                                    sumG += temp[j+1] * wgt;
                                    sumB += temp[j+2] * wgt;
                                    sumW += wgt;
                                }
                            }
                            if (sumW > 0) {
                                dst[idx] = Math.round(sumR / sumW);
                                dst[idx+1] = Math.round(sumG / sumW);
                                dst[idx+2] = Math.round(sumB / sumW);
                            }
                        }
                    }
                }

                return outData;
            }

            // --- ASYNC version of recolorImageData (processes in chunks to keep UI responsive) ---
            async function recolorImageDataAsync(srcData, width, height, onProgress) {
                const palette = getPaletteHex().map(hexToRgb).filter(c => c);
                if (palette.length === 0) return srcData;

                const outData = new ImageData(width, height);
                const src = srcData.data;
                const dst = outData.data;

                const strength = parseFloat(strengthVal.textContent);
                const smoothFactor = parseFloat(smoothVal.textContent);

                const sigma = mode === 'blocky' ? 1 : 30 + smoothFactor * 150;
                const invSigma2 = sigma > 0.1 ? 1 / (sigma * sigma) : 10000;

                const useBilateral = (mode === 'detail');

                // Step 1: soft palette mapping – process row by row asynchronously
                const blended = new Uint8ClampedArray(src.length);
                const rowsPerChunk = 20; // adjust for responsiveness

                for (let y = 0; y < height; y += rowsPerChunk) {
                    const endY = Math.min(y + rowsPerChunk, height);
                    for (let row = y; row < endY; row++) {
                        const baseIdx = row * width * 4;
                        for (let col = 0; col < width; col++) {
                            const i = baseIdx + col * 4;
                            const alpha = src[i+3];
                            if (alpha === 0) {
                                blended.set(src.subarray(i, i+4), i);
                                continue;
                            }
                            const r = src[i], g = src[i+1], b = src[i+2];

                            if (mode === 'blocky') {
                                let best = palette[0];
                                let minDist = Infinity;
                                for (const col of palette) {
                                    const dr = r - col[0], dg = g - col[1], db = b - col[2];
                                    const d = dr*dr + dg*dg + db*db;
                                    if (d < minDist) { minDist = d; best = col; }
                                }
                                blended[i] = best[0];
                                blended[i+1] = best[1];
                                blended[i+2] = best[2];
                                blended[i+3] = alpha;
                            } else {
                                let total = 0;
                                let sumR = 0, sumG = 0, sumB = 0;
                                for (const col of palette) {
                                    const dr = r - col[0], dg = g - col[1], db = b - col[2];
                                    const dist2 = dr*dr + dg*dg + db*db;
                                    const w = Math.exp(-dist2 * invSigma2);
                                    total += w;
                                    sumR += col[0] * w;
                                    sumG += col[1] * w;
                                    sumB += col[2] * w;
                                }
                                if (total < 1e-6) {
                                    let best = palette[0];
                                    let minDist = Infinity;
                                    for (const col of palette) {
                                        const dr = r - col[0], dg = g - col[1], db = b - col[2];
                                        const d = dr*dr + dg*dg + db*db;
                                        if (d < minDist) { minDist = d; best = col; }
                                    }
                                    blended[i] = best[0];
                                    blended[i+1] = best[1];
                                    blended[i+2] = best[2];
                                } else {
                                    blended[i] = Math.round(sumR / total);
                                    blended[i+1] = Math.round(sumG / total);
                                    blended[i+2] = Math.round(sumB / total);
                                }
                                blended[i+3] = alpha;
                            }
                        }
                    }
                    // Yield to event loop
                    await new Promise(resolve => setTimeout(resolve, 0));
                    if (onProgress) onProgress(Math.round((y / height) * 50)); // first half: blending
                }

                // Step 2: strength blend – also in chunks
                for (let y = 0; y < height; y += rowsPerChunk) {
                    const endY = Math.min(y + rowsPerChunk, height);
                    for (let row = y; row < endY; row++) {
                        const baseIdx = row * width * 4;
                        for (let col = 0; col < width; col++) {
                            const i = baseIdx + col * 4;
                            if (src[i+3] === 0) {
                                dst[i] = src[i];
                                dst[i+1] = src[i+1];
                                dst[i+2] = src[i+2];
                                dst[i+3] = src[i+3];
                                continue;
                            }
                            const invStr = 1 - strength;
                            dst[i] = Math.round(src[i] * invStr + blended[i] * strength);
                            dst[i+1] = Math.round(src[i+1] * invStr + blended[i+1] * strength);
                            dst[i+2] = Math.round(src[i+2] * invStr + blended[i+2] * strength);
                            dst[i+3] = src[i+3];
                        }
                    }
                    await new Promise(resolve => setTimeout(resolve, 0));
                    if (onProgress) onProgress(50 + Math.round((y / height) * 50)); // second half
                }

                // Step 3: optional bilateral (detail mode) – could also be chunked, but for now keep sync (rarely used with huge images)
                if (useBilateral && smoothFactor > 0.01) {
                    const radius = Math.ceil(smoothFactor * 5);
                    const spatialSigma = smoothFactor * 8;
                    const colorSigma = 30;
                    const temp = new Uint8ClampedArray(dst);

                    for (let y = 0; y < height; y++) {
                        for (let x = 0; x < width; x++) {
                            const idx = (y * width + x) * 4;
                            if (temp[idx+3] === 0) continue;

                            let sumR = 0, sumG = 0, sumB = 0, sumW = 0;
                            for (let dy = -radius; dy <= radius; dy++) {
                                for (let dx = -radius; dx <= radius; dx++) {
                                    const ny = y + dy, nx = x + dx;
                                    if (ny < 0 || ny >= height || nx < 0 || nx >= width) continue;
                                    const j = (ny * width + nx) * 4;
                                    const spatialW = Math.exp(-(dx*dx+dy*dy) / (2 * spatialSigma * spatialSigma));
                                    const dr = temp[idx] - temp[j];
                                    const dg = temp[idx+1] - temp[j+1];
                                    const db = temp[idx+2] - temp[j+2];
                                    const colorW = Math.exp(-(dr*dr + dg*dg + db*db) / (2 * colorSigma * colorSigma));
                                    const wgt = spatialW * colorW;
                                    sumR += temp[j] * wgt;
                                    sumG += temp[j+1] * wgt;
                                    sumB += temp[j+2] * wgt;
                                    sumW += wgt;
                                }
                            }
                            if (sumW > 0) {
                                dst[idx] = Math.round(sumR / sumW);
                                dst[idx+1] = Math.round(sumG / sumW);
                                dst[idx+2] = Math.round(sumB / sumW);
                            }
                        }
                        // yield every few rows in bilateral too
                        if (y % 20 === 0) await new Promise(resolve => setTimeout(resolve, 0));
                    }
                }

                return outData;
            }

            // --- apply palette to preview (sync, but that's fine for small preview) ---
            applyBtn.addEventListener('click', () => {
                if (!previewImageData) return;
                applyBtn.disabled = true;
                const originalText = applyBtn.textContent;
                applyBtn.textContent = 'processing…';

                setTimeout(() => {
                    try {
                        const w = canvas.width;
                        const h = canvas.height;
                        const newImageData = recolorImageData(previewImageData, w, h);
                        ctx.putImageData(newImageData, 0, 0);
                    } catch (err) {
                        console.warn(err);
                        alert('Error during recoloring');
                    } finally {
                        applyBtn.disabled = false;
                        applyBtn.textContent = originalText;
                    }
                }, 20);
            });

            // --- download full-resolution image (async, with progress) ---
            downloadBtn.addEventListener('click', async () => {
                if (!originalImageElement) return;

                downloadBtn.disabled = true;
                const originalText = downloadBtn.textContent;
                downloadBtn.textContent = '0%';

                try {
                    const offCanvas = document.createElement('canvas');
                    offCanvas.width = originalWidth;
                    offCanvas.height = originalHeight;
                    const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });

                    offCtx.drawImage(originalImageElement, 0, 0, originalWidth, originalHeight);
                    const fullSizeData = offCtx.getImageData(0, 0, originalWidth, originalHeight);

                    // Process asynchronously with progress updates
                    const recoloredFull = await recolorImageDataAsync(
                        fullSizeData,
                        originalWidth,
                        originalHeight,
                        (percent) => {
                            downloadBtn.textContent = percent + '%';
                        }
                    );

                    offCtx.putImageData(recoloredFull, 0, 0);

                    // Use toBlob to avoid large data URLs
                    offCanvas.toBlob((blob) => {
                        if (blob) {
                            const url = URL.createObjectURL(blob);
                            const link = document.createElement('a');
                            link.href = url;
                            link.download = 'recolor-harmony-full.png';
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                            URL.revokeObjectURL(url);
                        } else {
                            alert('Could not create image file.');
                        }
                        downloadBtn.disabled = false;
                        downloadBtn.textContent = originalText;
                    }, 'image/png');
                } catch (err) {
                    console.warn(err);
                    alert('Error creating full-size download');
                    downloadBtn.disabled = false;
                    downloadBtn.textContent = originalText;
                }
            });

            // drag & drop
            uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.style.background = '#1c1c22'; });
            uploadZone.addEventListener('dragleave', () => { uploadZone.style.background = '#131316'; });
            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.style.background = '#131316';
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) loadImage(file);
                else alert('Please drop an image');
            });
        })();
    </script>
</body>
</html>
