<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Picker with Transparency</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #a1b44b 0%, #a2794b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s ease;
    }

    #root {
      width: 100%;
      max-width: 420px;
    }

    .checkerboard {
      background-image: 
        linear-gradient(45deg, #ccc 25%, transparent 25%), 
        linear-gradient(-45deg, #ccc 25%, transparent 25%), 
        linear-gradient(45deg, transparent 75%, #ccc 75%), 
        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 10px 10px;
      background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function hsvToRgb(h, s, v) {
      let r, g, b;
      const i = Math.floor(h * 6);
      const f = h * 6 - i;
      const p = v * (1 - s);
      const q = v * (1 - f * s);
      const t = v * (1 - (1 - f) * s);
      
      switch (i % 6) {
        case 0: r = v; g = t; b = p; break;
        case 1: r = q; g = v; b = p; break;
        case 2: r = p; g = v; b = t; break;
        case 3: r = p; g = q; b = v; break;
        case 4: r = t; g = p; b = v; break;
        case 5: r = v; g = p; b = q; break;
      }
      
      return {
        r: Math.round(r * 255),
        g: Math.round(g * 255),
        b: Math.round(b * 255)
      };
    }

    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(x => {
        const hex = x.toString(16);
        return hex.length === 1 ? '0' + hex : hex;
      }).join('');
    }

    function rgbaToString(r, g, b, a) {
      return `rgba(${r}, ${g}, ${b}, ${a.toFixed(2)})`;
    }

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : null;
    }

    function rgbToHsv(r, g, b) {
      r /= 255;
      g /= 255;
      b /= 255;
      
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const diff = max - min;
      
      let h = 0;
      let s = max === 0 ? 0 : diff / max;
      let v = max;
      
      if (diff !== 0) {
        if (max === r) {
          h = ((g - b) / diff + (g < b ? 6 : 0)) / 6;
        } else if (max === g) {
          h = ((b - r) / diff + 2) / 6;
        } else {
          h = ((r - g) / diff + 4) / 6;
        }
      }
      
      return { h, s, v };
    }

    function ColorPicker() {
      const [hue, setHue] = useState(0);
      const [saturation, setSaturation] = useState(1);
      const [value, setValue] = useState(1);
      const [alpha, setAlpha] = useState(1);
      const [isDraggingSV, setIsDraggingSV] = useState(false);
      const [isDraggingHue, setIsDraggingHue] = useState(false);
      const [isDraggingAlpha, setIsDraggingAlpha] = useState(false);
      const [isEditing, setIsEditing] = useState(false);
      const [inputValue, setInputValue] = useState('');
      
      const svCanvasRef = useRef(null);
      const hueCanvasRef = useRef(null);
      const alphaCanvasRef = useRef(null);

      const rgb = hsvToRgb(hue, saturation, value);
      const hexColor = rgbToHex(rgb.r, rgb.g, rgb.b);
      const rgbaColor = rgbaToString(rgb.r, rgb.g, rgb.b, alpha);

      // Update background gradient based on selected color
      useEffect(() => {
        // Create gradient colors that are darker to prevent them from getting too bright
        const darkenFactor1 = 0.45; // First gradient color - darker
        const darkenFactor2 = 0.38; // Second gradient color - even darker
        
        // Use lower saturation for more muted colors
        const fixedSaturation = 0.4; // Reduced from 0.7
        const fixedValue = 1;
        
        // First color - based on current hue
        const baseRgb = hsvToRgb(hue, fixedSaturation, fixedValue);
        const color1 = {
          r: Math.round(baseRgb.r * darkenFactor1),
          g: Math.round(baseRgb.g * darkenFactor1),
          b: Math.round(baseRgb.b * darkenFactor1)
        };
        
        // Second color - complementary hue shift
        const hueShift1 = (hue + 0.2) % 1; // Slightly larger shift
        const comp1 = hsvToRgb(hueShift1, fixedSaturation, fixedValue * darkenFactor2);
        
        document.body.style.background = `linear-gradient(135deg, 
          rgb(${color1.r}, ${color1.g}, ${color1.b}) 0%, 
          rgb(${comp1.r}, ${comp1.g}, ${comp1.b}) 100%)`;
      }, [hue]); // Only depends on hue now, not saturation or value

      // Draw SV gradient
      useEffect(() => {
        const canvas = svCanvasRef.current;
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const width = canvas.width;
        const height = canvas.height;

        // Base hue color
        const baseRgb = hsvToRgb(hue, 1, 1);
        
        // Horizontal gradient (white to hue)
        const gradientH = ctx.createLinearGradient(0, 0, width, 0);
        gradientH.addColorStop(0, 'white');
        gradientH.addColorStop(1, `rgb(${baseRgb.r}, ${baseRgb.g}, ${baseRgb.b})`);
        ctx.fillStyle = gradientH;
        ctx.fillRect(0, 0, width, height);
        
        // Vertical gradient (transparent to black)
        const gradientV = ctx.createLinearGradient(0, 0, 0, height);
        gradientV.addColorStop(0, 'rgba(0, 0, 0, 0)');
        gradientV.addColorStop(1, 'rgba(0, 0, 0, 1)');
        ctx.fillStyle = gradientV;
        ctx.fillRect(0, 0, width, height);
      }, [hue]);

      // Draw hue bar
      useEffect(() => {
        const canvas = hueCanvasRef.current;
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        for (let i = 0; i < width; i++) {
          const h = i / width;
          const rgb = hsvToRgb(h, 1, 1);
          ctx.fillStyle = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
          ctx.fillRect(i, 0, 1, height);
        }
      }, []);

      // Draw alpha bar
      useEffect(() => {
        const canvas = alphaCanvasRef.current;
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        // Draw checkerboard background
        const checkSize = 5;
        for (let y = 0; y < height; y += checkSize) {
          for (let x = 0; x < width; x += checkSize) {
            ctx.fillStyle = ((x / checkSize) + (y / checkSize)) % 2 === 0 ? '#fff' : '#ccc';
            ctx.fillRect(x, y, checkSize, checkSize);
          }
        }

        // Draw gradient from transparent to opaque
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 1)`);
        gradient.addColorStop(1, `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0)`);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);
      }, [rgb.r, rgb.g, rgb.b]);

      const handleSVMouseDown = (e) => {
        setIsDraggingSV(true);
        updateSVPosition(e);
      };

      const handleSVMouseMove = (e) => {
        if (!isDraggingSV) return;
        updateSVPosition(e);
      };

      const handleSVMouseUp = () => {
        setIsDraggingSV(false);
      };

      const updateSVPosition = (e) => {
        const canvas = svCanvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        const y = Math.max(0, Math.min(e.clientY - rect.top, rect.height));
        
        setSaturation(x / rect.width);
        setValue(1 - (y / rect.height));
      };

      const handleHueMouseDown = (e) => {
        setIsDraggingHue(true);
        updateHuePosition(e);
      };

      const handleHueMouseMove = (e) => {
        if (!isDraggingHue) return;
        updateHuePosition(e);
      };

      const handleHueMouseUp = () => {
        setIsDraggingHue(false);
      };

      const updateHuePosition = (e) => {
        const canvas = hueCanvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        setHue(x / rect.width);
      };

      const handleAlphaMouseDown = (e) => {
        setIsDraggingAlpha(true);
        updateAlphaPosition(e);
      };

      const handleAlphaMouseMove = (e) => {
        if (!isDraggingAlpha) return;
        updateAlphaPosition(e);
      };

      const handleAlphaMouseUp = () => {
        setIsDraggingAlpha(false);
      };

      const updateAlphaPosition = (e) => {
        const canvas = alphaCanvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const y = Math.max(0, Math.min(e.clientY - rect.top, rect.height));
        setAlpha(1 - (y / rect.height));
      };

      useEffect(() => {
        if (isDraggingSV) {
          document.addEventListener('mousemove', handleSVMouseMove);
          document.addEventListener('mouseup', handleSVMouseUp);
        } else {
          document.removeEventListener('mousemove', handleSVMouseMove);
          document.removeEventListener('mouseup', handleSVMouseUp);
        }
        return () => {
          document.removeEventListener('mousemove', handleSVMouseMove);
          document.removeEventListener('mouseup', handleSVMouseUp);
        };
      }, [isDraggingSV]);

      useEffect(() => {
        if (isDraggingHue) {
          document.addEventListener('mousemove', handleHueMouseMove);
          document.addEventListener('mouseup', handleHueMouseUp);
        } else {
          document.removeEventListener('mousemove', handleHueMouseMove);
          document.removeEventListener('mouseup', handleHueMouseUp);
        }
        return () => {
          document.removeEventListener('mousemove', handleHueMouseMove);
          document.removeEventListener('mouseup', handleHueMouseUp);
        };
      }, [isDraggingHue]);

      useEffect(() => {
        if (isDraggingAlpha) {
          document.addEventListener('mousemove', handleAlphaMouseMove);
          document.addEventListener('mouseup', handleAlphaMouseUp);
        } else {
          document.removeEventListener('mousemove', handleAlphaMouseMove);
          document.removeEventListener('mouseup', handleAlphaMouseUp);
        }
        return () => {
          document.removeEventListener('mousemove', handleAlphaMouseMove);
          document.removeEventListener('mouseup', handleAlphaMouseUp);
        };
      }, [isDraggingAlpha]);

      const copyToClipboard = () => {
        const textToCopy = alpha === 1 ? hexColor : rgbaColor;
        navigator.clipboard.writeText(textToCopy);
      };

      const handleColorInput = (e) => {
        setInputValue(e.target.value);
      };

      const handleColorSubmit = () => {
        const input = inputValue.trim();
        
        // Try parsing as HEX
        if (input.match(/^#?[0-9a-f]{6}$/i)) {
          const hex = input.startsWith('#') ? input : '#' + input;
          const rgb = hexToRgb(hex);
          if (rgb) {
            const hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
            setHue(hsv.h);
            setSaturation(hsv.s);
            setValue(hsv.v);
            setAlpha(1);
            setIsEditing(false);
          }
        }
        // Try parsing as RGBA
        else if (input.match(/^rgba?\(/i)) {
          const match = input.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/i);
          if (match) {
            const r = parseInt(match[1]);
            const g = parseInt(match[2]);
            const b = parseInt(match[3]);
            const a = match[4] ? parseFloat(match[4]) : 1;
            
            if (r >= 0 && r <= 255 && g >= 0 && g <= 255 && b >= 0 && b <= 255 && a >= 0 && a <= 1) {
              const hsv = rgbToHsv(r, g, b);
              setHue(hsv.h);
              setSaturation(hsv.s);
              setValue(hsv.v);
              setAlpha(a);
              setIsEditing(false);
            }
          }
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') {
          handleColorSubmit();
        } else if (e.key === 'Escape') {
          setIsEditing(false);
          setInputValue('');
        }
      };

      const startEditing = () => {
        setIsEditing(true);
        setInputValue(alpha === 1 ? hexColor : rgbaColor);
      };

      return (
        <div style={{
          background: 'rgba(255, 255, 255, 0.98)',
          borderRadius: '24px',
          padding: '28px',
          boxShadow: '0 20px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1)',
          backdropFilter: 'blur(10px)',
        }}>
          {/* Header with color display */}
          <div style={{
            display: 'flex',
            alignItems: 'center',
            gap: '16px',
            marginBottom: '24px',
          }}>
            <div className="checkerboard" style={{
              width: '56px',
              height: '56px',
              borderRadius: '16px',
              boxShadow: '0 4px 12px rgba(0, 0, 0, 0.15), inset 0 0 0 1px rgba(0, 0, 0, 0.1)',
              position: 'relative',
              overflow: 'hidden',
            }}>
              <div style={{
                width: '100%',
                height: '100%',
                background: rgbaColor,
                transition: 'all 0.2s ease',
              }} />
            </div>
            <div style={{ flex: 1 }}>
              <div style={{
                fontSize: '13px',
                fontWeight: '500',
                color: '#64748b',
                marginBottom: '4px',
                textTransform: 'uppercase',
                letterSpacing: '0.5px',
              }}>
                Selected Color
              </div>
              <div style={{
                display: 'flex',
                alignItems: 'center',
                gap: '8px',
              }}>
                {isEditing ? (
                  <input
                    type="text"
                    value={inputValue}
                    onChange={handleColorInput}
                    onKeyDown={handleKeyDown}
                    onBlur={handleColorSubmit}
                    autoFocus
                    style={{
                      fontFamily: 'JetBrains Mono, monospace',
                      fontSize: '16px',
                      fontWeight: '600',
                      color: '#1e293b',
                      background: '#f1f5f9',
                      border: '2px solid #3b82f6',
                      borderRadius: '6px',
                      padding: '4px 8px',
                      outline: 'none',
                      width: '100%',
                    }}
                  />
                ) : (
                  <div
                    onClick={startEditing}
                    style={{
                      fontFamily: 'JetBrains Mono, monospace',
                      fontSize: alpha === 1 ? '20px' : '16px',
                      fontWeight: '600',
                      color: '#1e293b',
                      cursor: 'text',
                      padding: '4px',
                      borderRadius: '4px',
                      transition: 'background 0.2s ease',
                    }}
                    onMouseEnter={(e) => e.target.style.background = '#f1f5f9'}
                    onMouseLeave={(e) => e.target.style.background = 'transparent'}
                  >
                    {alpha === 1 ? hexColor.toUpperCase() : rgbaColor}
                  </div>
                )}
                <button
                  onClick={copyToClipboard}
                  style={{
                    background: 'none',
                    border: 'none',
                    cursor: 'pointer',
                    padding: '6px',
                    borderRadius: '6px',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    transition: 'background 0.2s ease',
                    flexShrink: 0,
                  }}
                  onMouseEnter={(e) => e.target.style.background = '#f1f5f9'}
                  onMouseLeave={(e) => e.target.style.background = 'none'}
                >
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          {/* Main picker area with SV Canvas and Alpha bar */}
          <div style={{
            display: 'flex',
            gap: '12px',
            marginBottom: '20px',
          }}>
            {/* SV Canvas */}
            <div style={{
              position: 'relative',
              flex: 1,
              borderRadius: '12px',
              overflow: 'hidden',
              boxShadow: '0 2px 8px rgba(0, 0, 0, 0.1)',
            }}>
              <canvas
                ref={svCanvasRef}
                width={270}
                height={200}
                onMouseDown={handleSVMouseDown}
                style={{
                  width: '100%',
                  height: '200px',
                  display: 'block',
                  cursor: 'crosshair',
                }}
              />
              {/* Cursor */}
              <div style={{
                position: 'absolute',
                left: `${saturation * 100}%`,
                top: `${(1 - value) * 100}%`,
                width: '20px',
                height: '20px',
                border: '3px solid white',
                borderRadius: '50%',
                transform: 'translate(-50%, -50%)',
                boxShadow: '0 2px 6px rgba(0, 0, 0, 0.3), inset 0 0 0 1px rgba(0, 0, 0, 0.1)',
                pointerEvents: 'none',
                transition: isDraggingSV ? 'none' : 'all 0.1s ease',
              }} />
            </div>

            {/* Alpha slider (vertical) */}
            <div style={{
              position: 'relative',
              width: '32px',
              borderRadius: '8px',
              overflow: 'hidden',
              boxShadow: '0 2px 6px rgba(0, 0, 0, 0.1)',
            }}>
              <canvas
                ref={alphaCanvasRef}
                width={32}
                height={200}
                onMouseDown={handleAlphaMouseDown}
                style={{
                  width: '100%',
                  height: '200px',
                  display: 'block',
                  cursor: 'pointer',
                }}
              />
              {/* Alpha indicator */}
              <div style={{
                position: 'absolute',
                top: `${(1 - alpha) * 100}%`,
                left: '50%',
                width: '100%',
                height: '2px',
                background: 'rgba(69,69,69)',
                transform: 'translate(-50%, -50%)',
                boxShadow: '0 0 4px rgba(0,0,0,0.3)',
                pointerEvents: 'none',
                transition: isDraggingAlpha ? 'none' : 'top 0.1s ease',
              }} />
            </div>
          </div>

          {/* Hue Slider */}
          <div style={{
            position: 'relative',
            height: '32px',
            borderRadius: '8px',
            overflow: 'hidden',
            boxShadow: '0 2px 6px rgba(0, 0, 0, 0.1)',
          }}>
            <canvas
              ref={hueCanvasRef}
              width={364}
              height={32}
              onMouseDown={handleHueMouseDown}
              style={{
                width: '100%',
                height: '100%',
                display: 'block',
                cursor: 'pointer',
              }}
            />
            {/* Hue indicator */}
            <div style={{
              position: 'absolute',
              left: `${hue * 100}%`,
              top: '50%',
              width: '2px',
              height: '100%',
              background: 'rgba(69,69,69)',
              transform: 'translate(-50%, -50%)',
              boxShadow: '0 0 4px rgba(0,0,0,0.3)',
              pointerEvents: 'none',
              transition: isDraggingHue ? 'none' : 'left 0.1s ease',
            }} />
          </div>

          {/* RGB and Alpha Values */}
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(4, 1fr)',
            gap: '12px',
            marginTop: '20px',
          }}>
            {[
              { label: 'Red', value: rgb.r, color: '#ef4444' },
              { label: 'Green', value: rgb.g, color: '#10b981' },
              { label: 'Blue', value: rgb.b, color: '#3b82f6' },
              { label: 'Alpha', value: Math.round(alpha * 100) + '%', color: '#8b5cf6' },
            ].map(({ label, value, color }) => (
              <div key={label} style={{
                background: 'rgba(0, 0, 0, 0.11)',
                borderRadius: '8px',
                padding: '10px',
                textAlign: 'center',
              }}>
                <div style={{
                  fontSize: '14px',
                  fontWeight: '600',
                  color: color,
                  marginBottom: '4px',
                  letterSpacing: '0.5px',
                }}>
                  {label}
                </div>
                <div style={{
                  fontFamily: 'JetBrains Mono, monospace',
                  fontSize: '15px',
                  fontWeight: '600',
                  color: '#1e293b',
                }}>
                  {value}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.render(<ColorPicker />, document.getElementById('root'));
  </script>
</body>
</html>
